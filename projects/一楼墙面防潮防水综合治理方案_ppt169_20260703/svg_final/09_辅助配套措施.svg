  <text x="60" y="86" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">防水工程是基础，日常习惯是关键 — 双管齐下才能真正告别返潮</text>

  
  <text x="350" y="125" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#0D4F8B">日常辅助措施</text>
