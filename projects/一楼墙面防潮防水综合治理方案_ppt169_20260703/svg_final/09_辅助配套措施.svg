  <text x="1000" y="448" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D8C5E">✓ 必须N型水泥基耐水腻子</text>

  <path fill="#FFFFFF" d="M98,482 H622 A8,8 0 0 1 630,490 V516 A8,8 0 0 1 622,524 H98 A8,8 0 0 1 90,516 V490 A8,8 0 0 1 98,482 Z" />
  <text x="110" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#E8612C" font-weight="bold">✕</text>
  <text x="132" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">只刷表面防水涂料</text>
  <text x="430" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D8C5E">✓ 必须先做渗透型防水处理</text>

  <path fill="#FFFFFF" d="M668,482 H1192 A8,8 0 0 1 1200,490 V516 A8,8 0 0 1 1192,524 H668 A8,8 0 0 1 660,516 V490 A8,8 0 0 1 668,482 Z" />
  <text x="680" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#E8612C" font-weight="bold">✕</text>
  <text x="702" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">回南天/阴雨天开窗通风</text>
  <text x="1000" y="500" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D8C5E">✓ 紧闭门窗 + 开除湿机</text>

  <path fill="#FFFFFF" d="M98,534 H622 A8,8 0 0 1 630,542 V568 A8,8 0 0 1 622,576 H98 A8,8 0 0 1 90,568 V542 A8,8 0 0 1 98,534 Z" />
  <text x="110" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#E8612C" font-weight="bold">✕</text>
  <text x="132" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">不处理外墙只做内墙</text>
  <text x="430" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D8C5E">✓ 外墙优先 → 内墙配合</text>

  <path fill="#FFFFFF" d="M668,534 H1192 A8,8 0 0 1 1200,542 V568 A8,8 0 0 1 1192,576 H668 A8,8 0 0 1 660,568 V542 A8,8 0 0 1 668,534 Z" />
  <text x="680" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#E8612C" font-weight="bold">✕</text>
  <text x="702" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">相信"纳米防水喷雾"能解决结构渗水</text>
  <text x="1000" y="552" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#0D8C5E">✓ 系统工程才能治本</text>

  
