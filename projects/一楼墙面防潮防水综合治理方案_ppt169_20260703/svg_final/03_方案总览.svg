<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D4F8B" />
      <stop offset="100%" stop-color="#0891B2" />
    </linearGradient>
    <linearGradient id="extGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0D4F8B" />
      <stop offset="100%" stop-color="#07355E" />
    </linearGradient>
    <linearGradient id="intGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0891B2" />
      <stop offset="100%" stop-color="#065F6E" />
    </linearGradient>
  </defs>
  
  <rect width="1280" height="720" fill="#FFFFFF" />
  
  <rect x="0" y="0" width="1280" height="5" fill="url(#headerBar)" />
  
  <text x="60" y="60" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="32" font-weight="bold" fill="#0D4F8B">治水之道：先外后内，双管齐下</text>
  <text x="60" y="90" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">外墙优先阻断水源 → 内墙跟进巩固防线，内外兼治才能彻底解决问题</text>

  
  <path fill="#F0F4F8" stroke="#D0D8E0" stroke-width="1" d="M72,120 H603 A12,12 0 0 1 615,132 V658 A12,12 0 0 1 603,670 H72 A12,12 0 0 1 60,658 V132 A12,12 0 0 1 72,120 Z" />
  
  <path fill="url(#extGrad)" d="M72,120 H603 A12,12 0 0 1 615,132 V164 A12,12 0 0 1 603,176 H72 A12,12 0 0 1 60,164 V132 A12,12 0 0 1 72,120 Z" />
  <rect x="60" y="164" width="555" height="12" fill="url(#extGrad)" />
  
  <g transform="translate(90.0, 134.0) scale(2.25)" fill="#FFFFFF">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M14 0H2V16H6V12H10V16H14V0ZM5 3H7V5H5V3ZM7 7H5V9H7V7ZM9 3H11V5H9V3ZM11 7H9V9H11V7Z" />
  </g>
  <text x="140" y="150" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">方案二：外墙正水面防水</text>
  <text x="140" y="170" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">优先执行 — 从源头阻断水源</text>

  
  <path fill="#FFFFFF" fill-opacity="0.2" d="M529,132 H581 A14,14 0 0 1 595,146 V146 A14,14 0 0 1 581,160 H529 A14,14 0 0 1 515,146 V146 A14,14 0 0 1 529,132 Z" />
  <text x="555" y="151" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">★★★ 优先</text>

  
  <g id="ext-steps">
    <circle cx="110" cy="230" r="22" fill="#0D4F8B" />
    <text x="110" y="236" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">1</text>
    <text x="150" y="228" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A1A2E">清洁外墙表面 + 修补裂缝</text>
    <text x="150" y="252" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">高压水枪冲洗污垢 / 水泥砂浆填补裂缝</text>

    <circle cx="110" cy="310" r="22" fill="#0D4F8B" />
    <text x="110" y="316" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">2</text>
    <text x="150" y="308" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A1A2E">涂刷丙烯酸弹性防水涂料 2遍</text>
    <text x="150" y="332" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">间隔 4-6 小时 / 覆盖率 3-5 m²/kg</text>

    <circle cx="110" cy="390" r="22" fill="#0D4F8B" />
    <text x="110" y="396" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="20" font-weight="bold" fill="#FFFFFF">3</text>
    <text x="150" y="388" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#1A1A2E">墙角与地面交接处加强处理</text>
    <text x="150" y="412" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">向上翻起 20-30cm，形成整体密封</text>
  </g>

  
  <path fill="#FFFFFF" stroke="#D0D8E0" stroke-width="1" d="M98,450 H577 A8,8 0 0 1 585,458 V522 A8,8 0 0 1 577,530 H98 A8,8 0 0 1 90,522 V458 A8,8 0 0 1 98,450 Z" />
  
  <g transform="translate(110.0, 474.0) scale(1.375)" fill="#0D4F8B">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM7 3V8.41421L10.2929 11.7071L11.7071 10.2929L9 7.58579V3H7Z" />
  </g>
  <text x="140" y="490" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">耗时约<tspan font-weight="bold" fill="#0D4F8B"> 1-2 天</tspan> · 材料费约<tspan font-weight="bold" fill="#E8612C"> 800-1,500 元</tspan></text>
  <text x="140" y="514" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">京东搜 → 东方雨虹 HCA121 丙烯酸弹性防水涂料</text>

  
  <line x1="640" y1="140" x2="640" y2="650" stroke="#D0D8E0" stroke-width="1.5" stroke-dasharray="4,4" />
  <circle cx="640" cy="395" r="18" fill="#FFFFFF" stroke="#D0D8E0" stroke-width="2" />
  <text x="640" y="401" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#E8612C">+</text>

  
  <path fill="#F0F4F8" stroke="#D0D8E0" stroke-width="1" d="M677,120 H1208 A12,12 0 0 1 1220,132 V658 A12,12 0 0 1 1208,670 H677 A12,12 0 0 1 665,658 V132 A12,12 0 0 1 677,120 Z" />
  
  <path fill="url(#intGrad)" d="M677,120 H1208 A12,12 0 0 1 1220,132 V164 A12,12 0 0 1 1208,176 H677 A12,12 0 0 1 665,164 V132 A12,12 0 0 1 677,120 Z" />
  <rect x="665" y="164" width="555" height="12" fill="url(#intGrad)" />
  
  <g transform="translate(695.0, 134.0) scale(2.25)" fill="#FFFFFF">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16L4.35009 13.3929C2.24773 11.8912 1 9.46667 1 6.88306V3L8 0L15 3V6.88306C15 9.46667 13.7523 11.8912 11.6499 13.3929L8 16ZM12.2071 5.70711L10.7929 4.29289L7 8.08579L5.20711 6.29289L3.79289 7.70711L7 10.9142L12.2071 5.70711Z" />
  </g>
  <text x="745" y="150" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="24" font-weight="bold" fill="#FFFFFF">方案一：内墙背水面综合治理</text>
  <text x="745" y="170" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#FFFFFF" fill-opacity="0.8">外墙完成后跟进 — 七步巩固防线</text>

  <path fill="#FFFFFF" fill-opacity="0.2" d="M1134,132 H1186 A14,14 0 0 1 1200,146 V146 A14,14 0 0 1 1186,160 H1134 A14,14 0 0 1 1120,146 V146 A14,14 0 0 1 1134,132 Z" />
  <text x="1160" y="151" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">★★☆ 跟进</text>

  
  <g id="int-steps">
    <text x="695" y="215" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">①</tspan> 铲除霉变层（超出霉变区30cm）
    </text>
    <text x="695" y="247" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">②</tspan> 杀菌消毒（84消毒液1:10湿敷10-15分钟）
    </text>
    <text x="695" y="279" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">③</tspan> 基层封闭（防水型墙固封闭毛细孔）
    </text>
    <text x="695" y="311" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">④</tspan> 防水层（渗透结晶防水涂料 2遍 + 养护48h）
    </text>
    <text x="695" y="343" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">⑤</tspan> 腻子层（N型水泥基耐水腻子 2遍，间隔24h）
    </text>
    <text x="695" y="375" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">⑥</tspan> 底漆（抗碱防潮底漆 1遍）
    </text>
    <text x="695" y="407" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" fill="#1A1A2E">
      <tspan font-weight="bold" fill="#0891B2">⑦</tspan> 面漆（防霉乳胶漆 / 无机涂料 2遍）
    </text>
  </g>

  
  <path fill="#FFFFFF" stroke="#D0D8E0" stroke-width="1" d="M703,450 H1182 A8,8 0 0 1 1190,458 V522 A8,8 0 0 1 1182,530 H703 A8,8 0 0 1 695,522 V458 A8,8 0 0 1 703,450 Z" />
  
  <g transform="translate(715.0, 474.0) scale(1.375)" fill="#0891B2">
    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM7 3V8.41421L10.2929 11.7071L11.7071 10.2929L9 7.58579V3H7Z" />
  </g>
  <text x="745" y="490" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">耗时约<tspan font-weight="bold" fill="#0891B2"> 5-7 天</tspan> · 材料费约<tspan font-weight="bold" fill="#E8612C"> 1,500-3,000 元</tspan></text>
  <text x="745" y="514" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">京东搜 → 德高K11通用型 渗透结晶防水涂料</text>

  
  <rect x="60" y="130" width="0" height="0" fill="none" />
  <rect x="280" y="680" width="720" height="0" fill="none" />
  <text x="640" y="695" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#E8612C" font-weight="bold">⚠ 外墙处理好后再做内墙，否则等于白做！先外后内 = 事半功倍</text>
  
  <text x="1220" y="695" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#5B6E7D">3 / 10</text>
</svg>