<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" width="1280" height="720">
  <defs>
    <linearGradient id="headerBar" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0D4F8B"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
  </defs>
  <rect width="1280" height="720" fill="#FFFFFF"/>
  <rect x="0" y="0" width="1280" height="5" fill="url(#headerBar)"/>
  <text x="60" y="58" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="32" font-weight="bold" fill="#0D4F8B">预算估算与品牌推荐</text>
  <text x="60" y="86" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">总预算约 5,000-10,000 元（含人工）· 品牌旗舰店正品保障</text>

  <!-- Left: Cost breakdown cards -->
  <rect x="60" y="115" width="580" height="440" rx="12" fill="#F0F4F8" stroke="#D0D8E0" stroke-width="1"/>
  <text x="350" y="150" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#0D4F8B">费用分项估算（100m²墙面）</text>

  <!-- Cost items -->
  <g id="cost-1">
    <rect x="90" y="175" width="520" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
    <use data-icon="chunk-filled/building" x="110" y="193" width="24" height="24" fill="#0D4F8B"/>
    <text x="148" y="200" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E">外墙防水材料</text>
    <text x="500" y="200" text-anchor="end" font-family="Georgia, 'Microsoft YaHei', serif" font-size="18" font-weight="bold" fill="#E8612C">800 - 1,500 元</text>
    <text x="148" y="220" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">丙烯酸弹性防水涂料 + 辅助材料</text>
  </g>

  <g id="cost-2">
    <rect x="90" y="240" width="520" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
    <use data-icon="chunk-filled/toolbox" x="110" y="258" width="24" height="24" fill="#0891B2"/>
    <text x="148" y="265" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E">内墙基层处理</text>
    <text x="500" y="265" text-anchor="end" font-family="Georgia, 'Microsoft YaHei', serif" font-size="18" font-weight="bold" fill="#E8612C">500 - 800 元</text>
    <text x="148" y="285" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">84消毒液 + 防水型墙固</text>
  </g>

  <g id="cost-3">
    <rect x="90" y="305" width="520" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
    <use data-icon="chunk-filled/shield-check" x="110" y="323" width="24" height="24" fill="#0D4F8B"/>
    <text x="148" y="330" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E">防水涂料</text>
    <text x="500" y="330" text-anchor="end" font-family="Georgia, 'Microsoft YaHei', serif" font-size="18" font-weight="bold" fill="#E8612C">600 - 1,000 元</text>
    <text x="148" y="350" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">渗透结晶防水涂料 35-50kg</text>
  </g>

  <g id="cost-4">
    <rect x="90" y="370" width="520" height="52" rx="8" fill="#FFFFFF" stroke="#E2E8F0" stroke-width="0.5"/>
    <use data-icon="chunk-filled/paint-roller" x="110" y="388" width="24" height="24" fill="#0891B2"/>
    <text x="148" y="395" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="16" font-weight="bold" fill="#1A1A2E">腻子 + 漆面</text>
    <text x="500" y="395" text-anchor="end" font-family="Georgia, 'Microsoft YaHei', serif" font-size="18" font-weight="bold" fill="#E8612C">600 - 1,200 元</text>
    <text x="148" y="415" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">N型腻子 + 抗碱底漆 + 防霉面漆</text>
  </g>

  <!-- Total -->
  <rect x="90" y="440" width="520" height="56" rx="8" fill="#0D4F8B"/>
  <text x="120" y="474" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="18" font-weight="bold" fill="#FFFFFF">材料费总计</text>
  <text x="500" y="474" text-anchor="end" font-family="Georgia, 'Microsoft YaHei', serif" font-size="22" font-weight="bold" fill="#FFFFFF">约 2,500 - 4,000 元</text>

  <text x="350" y="525" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">人工费约材料费的 1-1.5 倍 → 总预算约 5,000-10,000 元</text>

  <!-- Right: Brand recommendation table -->
  <rect x="665" y="115" width="555" height="440" rx="12" fill="#F0F4F8" stroke="#D0D8E0" stroke-width="1"/>
  <text x="942" y="150" text-anchor="middle" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="22" font-weight="bold" fill="#0D4F8B">品牌推荐</text>

  <!-- Mini table -->
  <rect x="695" y="175" width="495" height="40" rx="0" fill="#0D4F8B"/>
  <text x="715" y="201" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">品类</text>
  <text x="835" y="201" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">首选品牌</text>
  <text x="1040" y="201" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" font-weight="bold" fill="#FFFFFF">备选</text>

  <line x1="820" y1="175" x2="820" y2="375" stroke="#D0D8E0" stroke-width="0.5"/>
  <line x1="1020" y1="175" x2="1020" y2="375" stroke="#D0D8E0" stroke-width="0.5"/>

  <line x1="695" y1="215" x2="1190" y2="215" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="715" y="240" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">防水涂料</text>
  <text x="835" y="240" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">东方雨虹 / 德高K11</text>
  <text x="1040" y="240" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">科顺 / 青龙</text>

  <line x1="695" y1="255" x2="1190" y2="255" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="715" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">耐水腻子</text>
  <text x="835" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">美巢 / 德高</text>
  <text x="1040" y="280" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">立邦</text>

  <line x1="695" y1="295" x2="1190" y2="295" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="715" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">乳胶漆</text>
  <text x="835" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">多乐士 / 立邦</text>
  <text x="1040" y="320" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">三棵树</text>

  <line x1="695" y1="335" x2="1190" y2="335" stroke="#E2E8F0" stroke-width="0.5"/>
  <text x="715" y="360" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" font-weight="bold" fill="#1A1A2E">墙固/界面剂</text>
  <text x="835" y="360" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="15" fill="#1A1A2E">东方雨虹 / 德高</text>
  <text x="1040" y="360" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#5B6E7D">立邦</text>

  <!-- Tip box -->
  <rect x="695" y="400" width="495" height="130" rx="8" fill="#FFFFFF" stroke="#E8612C" stroke-width="1"/>
  <use data-icon="chunk-filled/lightbulb" x="720" y="424" width="28" height="28" fill="#E8612C"/>
  <text x="758" y="430" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="17" font-weight="bold" fill="#E8612C">采购提示</text>
  <text x="720" y="460" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#1A1A2E">· 建议自行采购，避免装修公司低端用料</text>
  <text x="720" y="484" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#1A1A2E">· 京东/天猫品牌旗舰店购买，认准防伪标识</text>
  <text x="720" y="508" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="14" fill="#1A1A2E">· 腻子保质期仅12个月，注意生产日期</text>

  <!-- Bottom note -->
  <text x="60" y="590" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="13" fill="#5B6E7D">* 以上价格为2025年市场参考价，实际以品牌旗舰店当日报价为准。大促期间（618/双11）入手更划算。</text>
  <text x="1220" y="695" text-anchor="end" font-family="'Microsoft YaHei', 'PingFang SC', Arial, sans-serif" font-size="11" fill="#5B6E7D">8 / 10</text>
</svg>